services:
  backend:
    build:
      context: ./backend
    container_name: courselens-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/storage:/app/storage
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: courselens-frontend
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:8000
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    restart: unless-stopped

volumes:
  frontend_node_modules:
