<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="#0f172a"/>

  <!-- Lens aperture blades (6 blades forming a circle with gaps) -->
  <g stroke="#ffffff" stroke-width="1.2" stroke-linecap="round" opacity="0.35">
    <line x1="16" y1="4.5" x2="16" y2="7"/>
    <line x1="22.5" y1="6.8" x2="21" y2="8.9"/>
    <line x1="27.2" y1="12.5" x2="25" y2="13.5"/>
    <line x1="27.5" y1="16" x2="25" y2="16"/>
    <line x1="27.2" y1="19.5" x2="25" y2="18.5"/>
    <line x1="22.5" y1="25.2" x2="21" y2="23.1"/>
    <line x1="16" y1="27.5" x2="16" y2="25"/>
    <line x1="9.5" y1="25.2" x2="11" y2="23.1"/>
    <line x1="4.8" y1="19.5" x2="7" y2="18.5"/>
    <line x1="4.5" y1="16" x2="7" y2="16"/>
    <line x1="4.8" y1="12.5" x2="7" y2="13.5"/>
    <line x1="9.5" y1="6.8" x2="11" y2="8.9"/>
  </g>

  <!-- Outer ring -->
  <circle cx="16" cy="16" r="11" stroke="#ffffff" stroke-width="1" opacity="0.2"/>

  <!-- Letter C as an arc (open circle = lens aperture shape) -->
  <path
    d="M 22 10.5
       A 8 8 0 1 0 22 21.5"
    stroke="#ffffff"
    stroke-width="2.6"
    stroke-linecap="round"
    fill="none"
  />
</svg>
